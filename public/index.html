<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escáner de Entrada</title>
    <link rel="stylesheet" href="./css/index.css">
    <script src="face-api.min.js"></script>
</head>
<body>
    <h1>Camara de Registro de Asistencia</h1>
    <p id="mensajeScanner">Iniciando sistema...</p>
    
    <div id="contenedor-camara">
        <video id="camara" width="720" height="560" autoplay muted></video>
    </div>

    <button id="btnAbrirAdmin">⚙️ Configurar Pase de Lista</button>
    
    <div id="modalAdmin">
        <div class="modal-contenido">
            <h2>InsertarNombreDelProyecto</h2>
            
            <label class="modal-label">👥 Grupo: </label>
            <div style="position: relative; width: 100%;">
                <input type="text" id="buscadorGruposModal" placeholder="Busca o selecciona un grupo..." autocomplete="off">
                <input type="hidden" id="selectGrupo" value="">
                <div id="resultadosGruposModal" class="dropdown-resultados"></div>
            </div>
    
            <label class="modal-label">⏰ Hora del Pase de Lista:</label>
            <div class="fila-tiempos">
                <div>
                    <label style="font-size: 12px; color: #aaa;">Desde:</label>
                    <input type="time" id="horaInicio">
                </div>
                <div>
                    <label style="font-size: 12px; color: #aaa;">Hasta:</label>
                    <input type="time" id="horaFin">
                </div>
            </div>

            <label class="modal-label">📝 ¿Qué clase es?</label>
            <input type="text" id="inputReunion" list="listaReuniones" placeholder="Ej: Clase1, Clase3...">
            <datalist id="listaReuniones"></datalist>
    
            <button id="btnCerrarDia">Generar Reporte Completo</button>
            <button id="btnCerrarModal">Cerrar Ventana</button>

            <div id="areaReporte"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script type="module" src="./js/index.js"></script>
</body>
</html>
