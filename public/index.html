<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adsum | Entry Scanner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📸</text></svg>">
    <link rel="stylesheet" href="./css/index.css">
    <script src="face-api.min.js"></script>
</head>
<body>
    <h1>Adsum Scanner</h1>
    <p id="scannerMessage">Starting system...</p>
    
    <div id="cameraContainer">
        <video id="camera" width="720" height="560" autoplay muted></video>
    </div>

    <button id="openAdminBtn">⚙️ Configure Roll Call</button>
    
    <div id="adminModal">
        <div class="modal-content">
            <h2>Adsum Control Panel</h2>

            <label class="modal-label">👨‍🏫 Teacher Email:</label>
            <div class="teacher-input-row">
                <input type="email" id="teacherEmailInput" placeholder="e.g., profesor@escuela.com">
                <button id="loadGroupsBtn">Load</button>
            </div>
            
            <label class="modal-label">👥 Group: </label>
            <div style="position: relative; width: 100%;">
                <input type="text" id="modalGroupSearch" placeholder="Search or select a group..." autocomplete="off">
                <input type="hidden" id="hiddenGroupSelect" value="">
                <div id="modalGroupResults" class="dropdown-results"></div>
            </div>
    
            <label class="modal-label">⏰ Roll Call Time:</label>
            <div class="time-row">
                <div>
                    <label style="font-size: 12px; color: #aaa;">From:</label>
                    <input type="time" id="startTime">
                </div>
                <div>
                    <label style="font-size: 12px; color: #aaa;">To:</label>
                    <input type="time" id="endTime">
                </div>
            </div>

            <label class="modal-label">📝 What session is it?</label>
            <input type="text" id="sessionInput" list="sessionList" placeholder="e.g., Session01, Session03...">
            <datalist id="sessionList"></datalist>
    
            <button id="generateReportBtn">Generate Full Report</button>
            <button id="closeModalBtn">Close Window</button>

            <div id="reportArea"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="module" src="./js/index.js"></script>

    <div class="watermark">
        Project <strong>Adsum</strong> | Developed by <span>EricBrwn</span>
    </div>
</body>
</html>
