<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Facial</title>
    <link rel="stylesheet" href="./css/registro.css">
    <script src="face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
</head>
<body>
    <h2>Registro de Nuevo Usuario</h2>

    <input type="text" id="nombreUsuario" placeholder="Escribe tu nombre completo">
    <br>
    <input type="email" id="correoUsuario" placeholder="tucorreo@ejemplo.com">
    <br><br>

    <p>Sube una foto de tu cara (bien iluminada):</p>
    <input type="file" id="inputFoto" accept="image/*, .heic">
    <br><br>

    <div id="contenedor-imagen">
        <img id="imagenPrevia" src="" alt="">
    </div>

    <br><br>

    <div style="max-width: 400px; margin: 0 auto; text-align: left;">
        <p style="font-weight: bold; margin-bottom: 5px;">🔍 Buscar o crear grupos:</p>
        <div style="position: relative;">
            <input type="text" id="buscadorGrupos" placeholder="Escribe para buscar..." autocomplete="off">
            <div id="resultadosBusqueda" class="dropdown-resultados"></div>
        </div>
    </div>

    <p style="margin-top: 15px; font-size: 14px; color: #555;">Grupos seleccionados:</p>
    <div class="caja-grupos" id="contenedor-grupos"></div>

    <p id="mensajeEstado">Esperando foto...</p>
    <button id="btnRegistrar" disabled>Guardar Registro</button>

    <script type="module" src="./js/registro.js"></script>
</body>
</html>
