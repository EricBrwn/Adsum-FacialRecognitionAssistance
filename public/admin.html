<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adsum | Admin Console</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
    <link rel="stylesheet" href="./css/index.css"> </head>
<body>
    <h1>Adsum Admin Console 🔐</h1>
    <p style="color: #aaa;">Superuser Access Only</p>

    <div class="modal-content" style="margin: 40px auto; display: block; text-align: left;">
        <h2 style="text-align: center; color: #2ecc71;">➕ Register Teacher</h2>
        <br>
        
        <label class="modal-label">Full Name:</label>
        <input type="text" id="newTeacherName" placeholder="e.g., Prof. Martínez" style="margin-bottom: 15px; width: 100%;">
        
        <label class="modal-label">Email Address:</label>
        <input type="email" id="newTeacherEmail" placeholder="profesor@escuela.com" style="margin-bottom: 15px; width: 100%;">
        
        <label class="modal-label">Assigned Groups (Comma separated):</label>
        <input type="text" id="newTeacherGroups" placeholder="e.g., AB2020.222, MR3030.333, CD4040.444" style="margin-bottom: 25px; width: 100%;">
        
        <button id="registerTeacherBtn" style="width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;">Register in Database</button>
    </div>

    <script type="module" src="./js/admin.js"></script>

    <div class="watermark">
        Project <strong>Adsum</strong> | Developed by <span>EricBrwn</span>
    </div>
</body>
</html>
